name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test on node@${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["lts/*"]
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
      - name: Setup pnpm 🔧
        uses: pnpm/action-setup@v6
      - name: Setup node 🔧
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: "pnpm"
      - name: Install 🪄
        run: pnpm install --frozen-lockfile
      - name: Lint 🔍
        run: pnpm run lint
      - name: Format 🔍
        run: pnpm run format:check
      - name: TypeScript 🔍
        run: pnpm run typecheck
      - name: Test 🧪
        run: pnpm run test
      - name: Build 📦
        run: pnpm run build
      - name: Plugin manifests 🔍
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool plugins/appstore-toolkit/.claude-plugin/plugin.json > /dev/null
          python3 -m json.tool plugins/appstore-toolkit/skills/appstore-release-prep/evals/evals.json > /dev/null
      # Catches syntax and import breakage in the bundled auditor. Non-zero is expected
      # here — this repo has no App Store listing — so the exit code is deliberately ignored.
      - name: Audit script smoke test 🧪
        run: |
          python3 plugins/appstore-toolkit/skills/appstore-release-prep/scripts/audit_release.py \
            --repo . --json > /dev/null || true

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    # id-token: write is required for OIDC trusted publishing + provenance
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
      - name: Setup pnpm 🔧
        uses: pnpm/action-setup@v6
      - name: Setup node 🔧
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"
          registry-url: https://registry.npmjs.org
      - name: Install 🪄
        run: pnpm install --frozen-lockfile
      - name: Upgrade npm 🔧
        # OIDC trusted publishing needs a recent npm CLI
        run: npm install -g npm@latest
      # A version already on npm cannot be republished, so re-running this job — after
      # re-pushing a tag, or a manual re-run — would fail on a duplicate. Skip instead,
      # so the tag is the source of truth and pushing one is always safe.
      - name: Check npm for this version 🔍
        id: published
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$name@$version is already published — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish 🚀
        if: steps.published.outputs.exists == 'false'
        run: npm publish --provenance --access public

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5
      - name: Create release 🏷️
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true

  docker:
    name: Docker (build & push)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    # id-token: write is required for cosign keyless signing
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Git metadata 🏷️
        id: git
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU 🧰
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx 🧰
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR 🔐
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata 🏷️
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,format=short

      - name: Build & push 🚢
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.git.outputs.commit }}
            GIT_COMMIT_DATE=${{ steps.git.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup cosign 🔏
        uses: sigstore/cosign-installer@v3

      - name: Sign image 🔏
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
